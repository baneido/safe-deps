name: docs

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Lint Markdown
        run: npm exec --yes --package markdownlint-cli2@0.17.2 -- markdownlint-cli2 "**/*.md"

      - name: Spell check Markdown
        run: npm exec --yes --package cspell@8.17.5 -- cspell --config .cspell.json "**/*.md"

      - name: Check Markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --accept 200,206,429
            --exclude-loopback
            --exclude-private
            './**/*.md'
