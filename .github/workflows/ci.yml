name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the jobs only need to read the repository.
permissions:
  contents: read

# Cancel superseded runs for the same ref so a quick succession of pushes does
# not pile up redundant CI.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: fmt / clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up Rust
        uses: ./.github/actions/setup-rust
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings
      - name: Clippy (curl-transport fallback)
        # The curl fallback is a distinct feature set (no native TLS crate); lint
        # it too so a feature-gating regression in that build is caught.
        run: cargo clippy --all-targets --locked --no-default-features --features curl-transport -- -D warnings
      - name: Test (curl-transport fallback)
        # The default `test` matrix builds native-http; the curl fallback's
        # transport (binary resolution, process boundary) is only exercised
        # under this feature, so run its tests here too.
        run: cargo test --locked --no-default-features --features curl-transport

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up Rust
        uses: ./.github/actions/setup-rust
      - name: Test
        run: cargo test --locked

  security:
    name: audit / deny
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up Rust
        uses: ./.github/actions/setup-rust
        with:
          # audit/deny don't compile the crate, so the build cache buys nothing.
          cache: "false"
      - name: Install cargo-audit and cargo-deny
        uses: taiki-e/install-action@8b3c737da4b541bf0fb5a3e0488ff20535badac9 # v2.82.1
        with:
          # Pin tool versions so the gate matches what deny.toml was validated
          # against; a future cargo-deny can change its config schema or defaults.
          tool: cargo-audit@0.22.2,cargo-deny@0.19.9
      - name: Audit (RUSTSEC advisories)
        run: cargo audit
      - name: Deny (advisories / licenses / bans / sources)
        run: cargo deny check

  coverage:
    name: coverage (informational)
    runs-on: ubuntu-latest
    # Coverage is informational: no threshold is set, so a coverage *drop* never
    # fails the job. The test run and report generation are intentionally NOT
    # continue-on-error, so genuine breakage (a failing test or the coverage
    # tooling erroring out) is surfaced as a red check instead of being hidden
    # behind a green job. Only the upload to GitHub's native Code Quality feature
    # is best-effort (fail-on-error: false) so the PR check does not go red if
    # Code Quality has not yet been enabled for the repository.
    permissions:
      contents: read
      # github-code-quality[bot] needs this to record the coverage report and
      # post the per-file coverage comment on pull requests.
      code-quality: write
      # actions/upload-code-coverage looks up the associated PR number on push
      # runs; without this the lookup is denied and coverage is not linked.
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up Rust
        uses: ./.github/actions/setup-rust
        with:
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@8b3c737da4b541bf0fb5a3e0488ff20535badac9 # v2.82.1
        with:
          tool: cargo-llvm-cov@0.6.21
      # Run the suite once under instrumentation, then derive both the log
      # summary and the Cobertura XML from the same profile data so the test
      # suite is not executed twice.
      - name: Run tests with coverage instrumentation
        run: cargo llvm-cov --no-report --locked --workspace
      - name: Coverage summary
        run: cargo llvm-cov report
      - name: Coverage report (Cobertura)
        run: cargo llvm-cov report --cobertura --output-path cobertura.xml
      - name: Upload to GitHub Code Quality
        # Native GitHub code coverage (replaces a third-party uploader such as
        # Codecov). Pinned to v1.3.0; `language` is the Linguist name.
        uses: actions/upload-code-coverage@abb5995db9e0199b0e2bb9dbd136fce4cb1ec4d3 # v1.3.0
        with:
          file: cobertura.xml
          language: Rust
          label: code-coverage/llvm-cov
          # Best-effort: do not fail the PR check if Code Quality is not enabled
          # for the repository yet (see the job comment above).
          fail-on-error: false

  actions-audit:
    name: actionlint / zizmor
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: actionlint
        # actionlint is a Go tool (not a crate), so install it from the pinned
        # release with a checksum rather than via install-action.
        run: |
          set -euo pipefail
          version=1.7.12
          sha256=8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
          url="https://github.com/rhysd/actionlint/releases/download/v${version}/actionlint_${version}_linux_amd64.tar.gz"
          curl -fsSL -o actionlint.tar.gz "$url"
          echo "${sha256}  actionlint.tar.gz" | sha256sum -c -
          tar xzf actionlint.tar.gz actionlint
          # Suppressions live in .github/actionlint.yaml, path-scoped to ci.yml,
          # so an unrelated workflow that misuses the (not-yet-known)
          # code-quality scope still errors. See that file for the rationale.
          ./actionlint -color
      - name: zizmor (informational)
        # Workflow security scanner. Informational for now: surface findings
        # without blocking. Pin the package version so rule changes are explicit.
        continue-on-error: true
        run: pipx run --spec zizmor==1.26.1 zizmor --offline .github/workflows/

  release-smoke:
    name: release smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up Rust
        uses: ./.github/actions/setup-rust
      - name: Release build
        run: cargo build --release --locked
      - name: Smoke run
        shell: bash
        run: |
          set -euo pipefail
          bin=target/release/safe-deps
          "$bin" --version
          "$bin" list-rules
          "$bin" explain SD001 > /dev/null
          # An empty workspace has no projects, so `check` is clean (exit 0).
          mkdir -p smoke-empty
          "$bin" check smoke-empty --format json > /dev/null
          echo "release smoke passed"

  version-bump:
    name: version bump completeness
    # Bumping the package version in Cargo.toml is what triggers a release on
    # merge (release-tag.yml derives the tag from the manifest). So guard, at
    # review time, that the bump is *complete* before it can ship: version
    # strictly increasing, Cargo.lock refreshed to match, a CHANGELOG section
    # written, and not a version that was already released. Only runs on PRs —
    # on push the bump has already merged and release-tag.yml takes over.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Full history + tags: diff Cargo.toml against the PR base, and reject
          # reusing an already-released version's tag.
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false
      - name: Check the version bump is complete
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          extract() { sed -E 's/^version = "(.*)"$/\1/'; }
          new_version="$(grep -m1 '^version = ' Cargo.toml | extract)"
          old_version="$(git show "$BASE_SHA:Cargo.toml" | grep -m1 '^version = ' | extract)"
          if [ "$new_version" = "$old_version" ]; then
            echo "package version unchanged ($new_version); nothing to check"
            exit 0
          fi
          echo "version bump: $old_version -> $new_version"
          fail=0

          # Strictly increasing — catches a typo'd downgrade or a stale base.
          highest="$(printf '%s\n%s\n' "$old_version" "$new_version" | sort -V | tail -1)"
          if [ "$highest" != "$new_version" ]; then
            echo "::error file=Cargo.toml::version $new_version is not greater than the base version $old_version" >&2
            fail=1
          fi

          # Cargo.lock refreshed — else the --locked release build fails.
          lock_version="$(awk '/^name = "safe-deps"$/{getline; print}' Cargo.lock | extract)"
          if [ "$lock_version" != "$new_version" ]; then
            echo "::error file=Cargo.lock::Cargo.lock has safe-deps $lock_version but Cargo.toml is $new_version; run 'cargo build' and commit Cargo.lock" >&2
            fail=1
          fi

          # CHANGELOG has a section for the new version (e.g. "## 0.2.3 — ...").
          if ! grep -qE "^##[[:space:]]+${new_version//./\\.}([[:space:]]|\$)" CHANGELOG.md; then
            echo "::error file=CHANGELOG.md::no '## $new_version' section in CHANGELOG.md; move the Unreleased notes under it" >&2
            fail=1
          fi

          # Never re-release a version — a crates.io publish is irreversible.
          if git rev-parse -q --verify "refs/tags/v$new_version" >/dev/null; then
            echo "::error file=Cargo.toml::tag v$new_version already exists; bump to an unreleased version" >&2
            fail=1
          fi

          [ "$fail" -eq 0 ] || exit 1
          echo "version bump to $new_version is complete"

  msrv:
    name: msrv (1.86)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install Rust 1.86 (MSRV)
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          # Keep in sync with `rust-version` in Cargo.toml.
          toolchain: "1.86"
      - name: Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build and test on the MSRV
        run: cargo test --locked

  docs-lint:
    name: docs lint (markdown / spelling)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          # Cache npm downloads keyed on package-lock.json so reruns are fast.
          cache: npm
      - name: Install dependencies
        run: npm ci
      # Surface known advisories in the docs-lint tooling. These deps are
      # dev-only (markdownlint/cspell) and pinned via package-lock.json, so
      # gate on high/critical to avoid churn from low/moderate transitive noise.
      - name: Audit dependencies
        run: npm audit --audit-level=high
      - name: Markdown lint
        run: npm run lint:markdown
      - name: Spell check
        run: npm run lint:spelling
