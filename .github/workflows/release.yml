name: Release

# Tag-triggered release: build per-target binaries, publish them to a GitHub
# Release with SHA-256 checksums, sign a consolidated checksum manifest with
# cosign (keyless), and attach a CycloneDX SBOM.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  # Never cancel an in-flight release; a partial release is worse than a queued
  # one.
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-version:
    name: verify tag matches Cargo.toml
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      # Guard against a tag/crate-version mismatch (e.g. tagging v0.2.1 while
      # Cargo.toml still says 0.1.0, which would ship a binary whose --version
      # disagrees with the release). Fail the whole release before any artifact
      # is built or published.
      - name: Compare tag to package version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          tag_version="${TAG#v}"
          cargo_version="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/^version = "(.*)"$/\1/')"
          echo "tag=$tag_version cargo=$cargo_version"
          if [ "$tag_version" != "$cargo_version" ]; then
            echo "::error::tag $TAG (version $tag_version) does not match Cargo.toml version $cargo_version; bump the version and re-tag" >&2
            exit 1
          fi

  create-release:
    name: create release
    needs: verify-version
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
    steps:
      - name: Create the release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        # Create the release once, up front, so the parallel build jobs only
        # upload to it (upload-rust-binary-action uploads but does not create,
        # and five jobs racing to create would collide). Idempotent on re-runs.
        run: |
          set -euo pipefail
          if ! gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release create "$TAG" --repo "$REPO" --title "$TAG" \
              --generate-notes --verify-tag
          fi

  build:
    name: build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write # upload assets to the release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-15-intel
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - name: Build and upload binary
        uses: taiki-e/upload-rust-binary-action@f0d45ae91ee7b8ee928de7a9d04d893a08bcbec6 # v1.30.2
        with:
          bin: safe-deps
          target: ${{ matrix.target }}
          locked: true
          # Archive named `safe-deps-<target>.{tar.gz,zip}`, with a per-archive
          # `.sha256` checksum file uploaded alongside it.
          archive: $bin-$target
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-crate:
    name: publish to crates.io
    # Gate on the full build matrix: a crates.io publish is irreversible (a
    # version can only be yanked, never replaced), so do not push the crate
    # unless safe-deps compiled on every release target first.
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # crates.io Trusted Publishing via GitHub OIDC
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up Rust
        uses: ./.github/actions/setup-rust
        with:
          # A fresh release build; the shared CI cache buys little here and a
          # clean tree avoids any chance of a stale artifact in the package.
          cache: "false"
      # Mint a short-lived, scoped publish token via GitHub OIDC — no long-lived
      # CARGO_REGISTRY_TOKEN secret to store or leak. Mirrors the keyless OIDC
      # signing the `sign` job already uses. Requires a one-time Trusted
      # Publisher registration for this repo+workflow on crates.io (see
      # RELEASING.md). The action's post-step revokes the token when the job ends.
      - name: Authenticate to crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
      - name: Publish
        # Hand the short-lived OIDC token to cargo via CARGO_REGISTRY_TOKEN rather
        # than a `--token` flag: the secret never lands in the process argv (which
        # is visible to other processes and can leak into logs), and the run script
        # contains no `${{ }}` expansion for a runner to interpolate into the shell
        # (closes zizmor's template-injection finding). --locked publishes against
        # the committed Cargo.lock (verify-version already confirmed the tag matches
        # the crate version). Re-running for an already-published version fails by
        # design; that is the maintainer's cue.
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish --locked

  sign:
    name: sign checksums
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # upload the signed manifest
      id-token: write # cosign keyless signing via GitHub OIDC
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Consolidate and sign checksums
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir checksums
          cd checksums
          # Gather every per-archive checksum the build matrix uploaded.
          gh release download "$TAG" --repo "$REPO" --pattern '*.sha256'
          cat ./*.sha256 | sort -k2 > SHA256SUMS
          # Keyless signature (cert + signature + transparency-log proof bundle).
          cosign sign-blob --yes --bundle SHA256SUMS.cosign.bundle SHA256SUMS
          gh release upload "$TAG" SHA256SUMS SHA256SUMS.cosign.bundle \
            --repo "$REPO" --clobber

  sbom:
    name: sbom
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # upload the SBOM
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable
      - name: Install cargo-cyclonedx
        uses: taiki-e/install-action@8b3c737da4b541bf0fb5a3e0488ff20535badac9 # v2.82.1
        with:
          tool: cargo-cyclonedx@0.5.7
      - name: Generate and upload SBOM
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # cargo-cyclonedx 0.5.7 has no --locked flag; guard the lockfile
          # explicitly before generating the SBOM.
          cargo metadata --locked --format-version 1 >/dev/null
          cargo cyclonedx --format json --override-filename safe-deps.sbom
          gh release upload "$TAG" safe-deps.sbom.json --repo "$REPO" --clobber

  homebrew:
    name: update Homebrew formula
    # Gate on `sign`: the SHA256SUMS manifest this job reads is produced there, and
    # the formula should only ship once the release artifacts are signed.
    needs: sign
    runs-on: ubuntu-latest
    permissions:
      contents: read # only reads scripts/safe-deps.rb.tmpl; the tap push uses TAP_TOKEN
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # The tap push authenticates with TAP_TOKEN, so don't keep this repo's
          # checkout credentials around.
          persist-credentials: false
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Open Homebrew formula PR on baneido/homebrew-tap
        env:
          # Token with push + PR permission on baneido/homebrew-tap (shared with the
          # shipsafe/jp-pii-detect release bots). If unset, skip rather than fail —
          # the rest of the release has already succeeded.
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "::warning::TAP_GITHUB_TOKEN not set — skipping Homebrew formula update"
            exit 0
          fi
          version="${TAG#v}"

          # Pull the signed checksum manifest the `sign` job published and look up
          # each per-target hash by archive name. Format is "<sha256>  <filename>".
          gh release download "$TAG" --repo "$REPO" --pattern 'SHA256SUMS' -O SHA256SUMS
          sha() {
            value=$(awk -v asset="$1" '$2 == asset {print $1}' SHA256SUMS)
            [ -n "$value" ] || { echo "::error::SHA256SUMS missing $1" >&2; exit 1; }
            printf '%s' "$value"
          }
          darwin_arm64=$(sha safe-deps-aarch64-apple-darwin.tar.gz)
          darwin_amd64=$(sha safe-deps-x86_64-apple-darwin.tar.gz)
          linux_arm64=$(sha safe-deps-aarch64-unknown-linux-gnu.tar.gz)
          linux_amd64=$(sha safe-deps-x86_64-unknown-linux-gnu.tar.gz)

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/baneido/homebrew-tap.git" tap
          mkdir -p tap/Formula
          sed -e "s|{{VERSION}}|${version}|g" \
              -e "s|{{TAG}}|${TAG}|g" \
              -e "s|{{SHA256_DARWIN_ARM64}}|${darwin_arm64}|g" \
              -e "s|{{SHA256_DARWIN_AMD64}}|${darwin_amd64}|g" \
              -e "s|{{SHA256_LINUX_ARM64}}|${linux_arm64}|g" \
              -e "s|{{SHA256_LINUX_AMD64}}|${linux_amd64}|g" \
              scripts/safe-deps.rb.tmpl > tap/Formula/safe-deps.rb

          cd tap
          # The tap's main is protected (review required), so open a PR from a
          # release branch instead of pushing to main.
          if [ -z "$(git status --porcelain Formula/safe-deps.rb)" ]; then
            echo "formula already up to date for ${version}; nothing to do"
            exit 0
          fi
          git config user.name "safe-deps-release-bot"
          git config user.email "contact@baneido.com"
          branch="safe-deps-${version}"
          git checkout -b "$branch"
          git add Formula/safe-deps.rb
          git commit -m "safe-deps ${version}"
          git push --force-with-lease origin "$branch"

          export GH_TOKEN="$TAP_TOKEN"
          if gh pr view "$branch" --repo baneido/homebrew-tap >/dev/null 2>&1; then
            echo "PR for ${branch} already exists — branch updated"
          else
            gh pr create --repo baneido/homebrew-tap --base main --head "$branch" \
              --title "safe-deps ${version}" \
              --body "Automated Homebrew formula update for safe-deps ${version}. Release: https://github.com/${REPO}/releases/tag/${TAG}"
          fi
