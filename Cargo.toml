[package]
name = "safe-deps"
version = "0.1.0"
edition = "2021"
rust-version = "1.80"
license = "MIT"
description = "Static linter for package-management security practices."
repository = "https://github.com/baneido/safe-deps"

[[bin]]
name = "safe-deps"
path = "src/main.rs"

[dependencies]
clap = { version = "4.5", features = ["derive", "env"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
toml = "0.8"
thiserror = "2"
ignore = "0.4"
globset = "0.4"
rayon = "1"

[dev-dependencies]
insta = "1"
assert_cmd = "2"
predicates = "3"
tempfile = "3"

[profile.release]
lto = true
codegen-units = 1
